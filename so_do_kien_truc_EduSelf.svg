<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#000}
      .sub{font:500 24px Arial,sans-serif;fill:#111}
      .layerTitle{font:700 26px Arial,sans-serif;fill:#000}
      .boxTitle{font:700 24px Arial,sans-serif;fill:#000}
      .text{font:500 20px Arial,sans-serif;fill:#000}
      .small{font:500 18px Arial,sans-serif;fill:#111}
      .outer{fill:#f2f2f2;stroke:#000;stroke-width:3}
      .box{fill:#fff;stroke:#000;stroke-width:3}
      .storage{fill:#fff;stroke:#000;stroke-width:4}
      .arrow{stroke:#000;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#000;stroke-width:3;fill:none;stroke-dasharray:12 9;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#000"/>
    </marker>
  </defs>

  <rect width="1800" height="1100" fill="#fff"/>
  <text x="900" y="62" text-anchor="middle" class="title">Hình 1. Sơ đồ kiến trúc tổng quan hệ thống EduSelf</text>
  <text x="900" y="102" text-anchor="middle" class="sub">Người dùng, giao diện web, API nghiệp vụ, PostgreSQL, dịch vụ AI và lưu trữ PDF</text>

  <rect x="60" y="155" width="300" height="650" rx="16" class="outer"/>
  <text x="210" y="200" text-anchor="middle" class="layerTitle">1. Người dùng</text>
  <rect x="100" y="255" width="220" height="75" rx="10" class="box"/>
  <text x="210" y="302" text-anchor="middle" class="boxTitle">Học sinh</text>
  <rect x="100" y="365" width="220" height="75" rx="10" class="box"/>
  <text x="210" y="412" text-anchor="middle" class="boxTitle">Phụ huynh</text>
  <rect x="100" y="475" width="220" height="75" rx="10" class="box"/>
  <text x="210" y="522" text-anchor="middle" class="boxTitle">Giáo viên</text>
  <rect x="100" y="585" width="220" height="75" rx="10" class="box"/>
  <text x="210" y="632" text-anchor="middle" class="boxTitle">Quản trị viên</text>
  <text x="210" y="725" text-anchor="middle" class="text">Truy cập bằng</text>
  <text x="210" y="755" text-anchor="middle" class="text">trình duyệt web</text>

  <rect x="445" y="155" width="360" height="650" rx="16" class="outer"/>
  <text x="625" y="200" text-anchor="middle" class="layerTitle">2. Giao diện Web</text>
  <text x="625" y="232" text-anchor="middle" class="small">Next.js, React, TypeScript, Tailwind CSS</text>
  <rect x="495" y="275" width="260" height="65" rx="10" class="box"/>
  <text x="625" y="316" text-anchor="middle" class="boxTitle">Dashboard</text>
  <rect x="495" y="370" width="260" height="65" rx="10" class="box"/>
  <text x="625" y="411" text-anchor="middle" class="boxTitle">Trang học + PDF</text>
  <rect x="495" y="465" width="260" height="65" rx="10" class="box"/>
  <text x="625" y="506" text-anchor="middle" class="boxTitle">Chat AI trợ giảng</text>
  <rect x="495" y="560" width="260" height="65" rx="10" class="box"/>
  <text x="625" y="601" text-anchor="middle" class="boxTitle">Bài tập, tiến độ</text>
  <rect x="495" y="655" width="260" height="65" rx="10" class="box"/>
  <text x="625" y="696" text-anchor="middle" class="boxTitle">Quản trị học liệu</text>

  <rect x="890" y="155" width="360" height="650" rx="16" class="outer"/>
  <text x="1070" y="200" text-anchor="middle" class="layerTitle">3. API nghiệp vụ</text>
  <text x="1070" y="232" text-anchor="middle" class="small">Next.js API Routes</text>
  <rect x="940" y="275" width="260" height="65" rx="10" class="box"/>
  <text x="1070" y="316" text-anchor="middle" class="boxTitle">Xác thực, phân quyền</text>
  <rect x="940" y="370" width="260" height="65" rx="10" class="box"/>
  <text x="1070" y="411" text-anchor="middle" class="boxTitle">Môn học, bài học</text>
  <rect x="940" y="465" width="260" height="65" rx="10" class="box"/>
  <text x="1070" y="506" text-anchor="middle" class="boxTitle">Bài tập, chấm bài</text>
  <rect x="940" y="560" width="260" height="65" rx="10" class="box"/>
  <text x="1070" y="601" text-anchor="middle" class="boxTitle">Tiến độ, phiên học</text>
  <rect x="940" y="655" width="260" height="65" rx="10" class="box"/>
  <text x="1070" y="696" text-anchor="middle" class="boxTitle">Điểm yếu, báo cáo</text>

  <rect x="1340" y="160" width="360" height="180" rx="16" class="storage"/>
  <text x="1520" y="205" text-anchor="middle" class="layerTitle">4. PostgreSQL</text>
  <text x="1520" y="240" text-anchor="middle" class="text">Neon + Prisma ORM</text>
  <text x="1520" y="272" text-anchor="middle" class="small">Người dùng, bài học, bài tập</text>
  <text x="1520" y="302" text-anchor="middle" class="small">tiến độ, điểm yếu, báo cáo</text>

  <rect x="1340" y="425" width="360" height="180" rx="16" class="storage"/>
  <text x="1520" y="470" text-anchor="middle" class="layerTitle">5. Dịch vụ AI</text>
  <text x="1520" y="505" text-anchor="middle" class="text">OpenAI / Gemini</text>
  <text x="1520" y="537" text-anchor="middle" class="small">Hỏi đáp, tạo bài, chấm bài</text>
  <text x="1520" y="567" text-anchor="middle" class="small">phản hồi, phát hiện điểm yếu</text>

  <rect x="1340" y="690" width="360" height="180" rx="16" class="storage"/>
  <text x="1520" y="735" text-anchor="middle" class="layerTitle">6. Lưu trữ PDF</text>
  <text x="1520" y="770" text-anchor="middle" class="text">S3 / Public Storage</text>
  <text x="1520" y="802" text-anchor="middle" class="small">Tài liệu bài học, file bài tập</text>
  <text x="1520" y="832" text-anchor="middle" class="small">và bài nộp của học sinh</text>

  <path d="M360 480 H445" class="arrow"/>
  <path d="M805 480 H890" class="arrow"/>
  <path d="M1250 250 H1340" class="arrow"/>
  <path d="M1250 515 H1340" class="arrow"/>
  <path d="M1250 780 H1340" class="arrow"/>
  <path d="M1340 300 C1285 365 1285 615 1250 670" class="dash"/>
  <path d="M1340 565 C1285 610 1285 640 1250 670" class="dash"/>
  <path d="M1340 820 C1285 780 1285 720 1250 680" class="dash"/>

  <rect x="170" y="930" width="1460" height="100" rx="10" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="900" y="968" text-anchor="middle" class="text">Luồng chính: Người dùng thao tác trên giao diện web -> API xử lý nghiệp vụ -> lưu dữ liệu, gọi AI hoặc truy xuất PDF.</text>
  <text x="900" y="1000" text-anchor="middle" class="small">Mũi tên liền: yêu cầu xử lý chính. Mũi tên nét đứt: dữ liệu trả về API để cá nhân hóa học tập, báo cáo và phát hiện điểm yếu.</text>
</svg>
