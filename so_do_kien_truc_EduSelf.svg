<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 21px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 16px Arial, sans-serif; fill: #334155; }
      .small { font: 500 14px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow2 { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrowhead-green); }
      .dash { stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669" />
    </marker>
    <linearGradient id="userBg" x1="0" x2="1">
      <stop offset="0" stop-color="#eff6ff" />
      <stop offset="1" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="webBg" x1="0" x2="1">
      <stop offset="0" stop-color="#f0fdf4" />
      <stop offset="1" stop-color="#dcfce7" />
    </linearGradient>
    <linearGradient id="apiBg" x1="0" x2="1">
      <stop offset="0" stop-color="#fff7ed" />
      <stop offset="1" stop-color="#ffedd5" />
    </linearGradient>
    <linearGradient id="dataBg" x1="0" x2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="aiBg" x1="0" x2="1">
      <stop offset="0" stop-color="#f5f3ff" />
      <stop offset="1" stop-color="#ede9fe" />
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="#ffffff" />
  <text x="700" y="58" text-anchor="middle" class="title">Sơ đồ kiến trúc tổng quan hệ thống EduSelf</text>
  <text x="700" y="88" text-anchor="middle" class="subtitle">Người dùng - Giao diện web - API nghiệp vụ - Cơ sở dữ liệu - Dịch vụ AI - Lưu trữ PDF</text>

  <rect x="60" y="170" width="250" height="420" rx="28" fill="url(#userBg)" stroke="#60a5fa" stroke-width="2" />
  <text x="185" y="210" text-anchor="middle" class="box-title">Người dùng</text>
  <rect x="90" y="245" width="190" height="58" rx="16" fill="#ffffff" stroke="#bfdbfe" />
  <text x="185" y="281" text-anchor="middle" class="box-text">Học sinh</text>
  <rect x="90" y="320" width="190" height="58" rx="16" fill="#ffffff" stroke="#bfdbfe" />
  <text x="185" y="356" text-anchor="middle" class="box-text">Phụ huynh</text>
  <rect x="90" y="395" width="190" height="58" rx="16" fill="#ffffff" stroke="#bfdbfe" />
  <text x="185" y="431" text-anchor="middle" class="box-text">Giáo viên</text>
  <rect x="90" y="470" width="190" height="58" rx="16" fill="#ffffff" stroke="#bfdbfe" />
  <text x="185" y="506" text-anchor="middle" class="box-text">Quản trị viên</text>
  <text x="185" y="555" text-anchor="middle" class="small">Truy cập bằng trình duyệt</text>

  <rect x="395" y="150" width="290" height="460" rx="28" fill="url(#webBg)" stroke="#22c55e" stroke-width="2" />
  <text x="540" y="190" text-anchor="middle" class="box-title">Giao diện Web</text>
  <text x="540" y="220" text-anchor="middle" class="small">Next.js 14, React, TypeScript</text>
  <rect x="425" y="260" width="230" height="54" rx="16" fill="#ffffff" stroke="#bbf7d0" />
  <text x="540" y="293" text-anchor="middle" class="box-text">Dashboard</text>
  <rect x="425" y="330" width="230" height="54" rx="16" fill="#ffffff" stroke="#bbf7d0" />
  <text x="540" y="363" text-anchor="middle" class="box-text">Trang học + PDF</text>
  <rect x="425" y="400" width="230" height="54" rx="16" fill="#ffffff" stroke="#bbf7d0" />
  <text x="540" y="433" text-anchor="middle" class="box-text">Chat AI trợ giảng</text>
  <rect x="425" y="470" width="230" height="54" rx="16" fill="#ffffff" stroke="#bbf7d0" />
  <text x="540" y="503" text-anchor="middle" class="box-text">Bài tập, tiến độ</text>
  <rect x="425" y="540" width="230" height="54" rx="16" fill="#ffffff" stroke="#bbf7d0" />
  <text x="540" y="573" text-anchor="middle" class="box-text">Quản trị học liệu</text>

  <rect x="775" y="150" width="300" height="460" rx="28" fill="url(#apiBg)" stroke="#fb923c" stroke-width="2" />
  <text x="925" y="190" text-anchor="middle" class="box-title">API nghiệp vụ</text>
  <text x="925" y="220" text-anchor="middle" class="small">Next.js API Routes</text>
  <rect x="805" y="260" width="240" height="54" rx="16" fill="#ffffff" stroke="#fed7aa" />
  <text x="925" y="293" text-anchor="middle" class="box-text">Xác thực, phân quyền</text>
  <rect x="805" y="330" width="240" height="54" rx="16" fill="#ffffff" stroke="#fed7aa" />
  <text x="925" y="363" text-anchor="middle" class="box-text">Môn học, bài học</text>
  <rect x="805" y="400" width="240" height="54" rx="16" fill="#ffffff" stroke="#fed7aa" />
  <text x="925" y="433" text-anchor="middle" class="box-text">Bài tập, chấm bài</text>
  <rect x="805" y="470" width="240" height="54" rx="16" fill="#ffffff" stroke="#fed7aa" />
  <text x="925" y="503" text-anchor="middle" class="box-text">Tiến độ, phiên học</text>
  <rect x="805" y="540" width="240" height="54" rx="16" fill="#ffffff" stroke="#fed7aa" />
  <text x="925" y="573" text-anchor="middle" class="box-text">Điểm yếu, báo cáo</text>

  <rect x="1145" y="160" width="210" height="150" rx="24" fill="url(#dataBg)" stroke="#64748b" stroke-width="2" />
  <text x="1250" y="200" text-anchor="middle" class="box-title">PostgreSQL</text>
  <text x="1250" y="232" text-anchor="middle" class="box-text">Neon + Prisma ORM</text>
  <text x="1250" y="263" text-anchor="middle" class="small">Người dùng, bài học,</text>
  <text x="1250" y="285" text-anchor="middle" class="small">tiến độ, bài tập, điểm yếu</text>

  <rect x="1145" y="375" width="210" height="150" rx="24" fill="url(#aiBg)" stroke="#8b5cf6" stroke-width="2" />
  <text x="1250" y="415" text-anchor="middle" class="box-title">Dịch vụ AI</text>
  <text x="1250" y="447" text-anchor="middle" class="box-text">OpenAI / Gemini</text>
  <text x="1250" y="478" text-anchor="middle" class="small">Hỏi đáp, tạo bài,</text>
  <text x="1250" y="500" text-anchor="middle" class="small">chấm bài, phản hồi</text>

  <rect x="1145" y="590" width="210" height="150" rx="24" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" />
  <text x="1250" y="630" text-anchor="middle" class="box-title">Lưu trữ PDF</text>
  <text x="1250" y="662" text-anchor="middle" class="box-text">S3 / public storage</text>
  <text x="1250" y="693" text-anchor="middle" class="small">Tài liệu bài học,</text>
  <text x="1250" y="715" text-anchor="middle" class="small">file bài tập, bài nộp</text>

  <path class="arrow" d="M310 380 C340 380 360 380 395 380" />
  <path class="arrow" d="M685 380 C720 380 740 380 775 380" />
  <path class="arrow" d="M1075 235 C1105 235 1115 235 1145 235" />
  <path class="arrow" d="M1075 450 C1105 450 1115 450 1145 450" />
  <path class="arrow" d="M1075 665 C1105 665 1115 665 1145 665" />

  <path class="arrow2 dash" d="M1145 285 C1105 320 1105 525 1075 560" />
  <path class="arrow2 dash" d="M1145 500 C1105 520 1105 540 1075 560" />
  <path class="arrow2 dash" d="M1145 715 C1105 690 1105 610 1075 570" />

  <rect x="165" y="790" width="1070" height="62" rx="20" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="700" y="815" text-anchor="middle" class="box-text">Luồng chính: Người dùng thao tác trên giao diện web -> API xử lý nghiệp vụ -> lưu dữ liệu, gọi AI hoặc truy xuất PDF</text>
  <text x="700" y="842" text-anchor="middle" class="small">Dữ liệu học tập được lưu lại để phục vụ cá nhân hóa, báo cáo phụ huynh/giáo viên và phát hiện điểm yếu</text>
</svg>
