<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
  <defs>
    <style>
      .title{font:700 42px Arial,sans-serif;fill:#000}.sub{font:500 24px Arial,sans-serif;fill:#111}.boxTitle{font:700 25px Arial,sans-serif;fill:#000}.text{font:500 21px Arial,sans-serif;fill:#000}.small{font:500 18px Arial,sans-serif;fill:#111}.box{fill:#fff;stroke:#000;stroke-width:3}.group{fill:#f2f2f2;stroke:#000;stroke-width:3}.arrow{stroke:#000;stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke:#000;stroke-width:3;fill:none;stroke-dasharray:12 9;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#000"/></marker>
  </defs>
  <rect width="1800" height="1050" fill="#fff"/>
  <text x="900" y="62" text-anchor="middle" class="title">Hình 9. Quy trình học sinh học bài, hỏi AI và luyện tập khắc phục</text>
  <text x="900" y="102" text-anchor="middle" class="sub">Luồng học cá nhân hóa: học nội dung, hỏi AI, làm bài, nhận phản hồi, phát hiện điểm yếu và luyện tập bù đắp</text>

  <rect x="70" y="150" width="1660" height="230" rx="16" class="group"/>
  <text x="110" y="195" class="boxTitle">Giai đoạn 1: Học bài và tương tác AI</text>
  <rect x="115" y="235" width="235" height="95" rx="10" class="box"/>
  <text x="232" y="270" text-anchor="middle" class="boxTitle">1. Đăng nhập</text>
  <text x="232" y="300" text-anchor="middle" class="text">Tải hồ sơ, lớp, tiến độ</text>
  <rect x="430" y="235" width="235" height="95" rx="10" class="box"/>
  <text x="547" y="270" text-anchor="middle" class="boxTitle">2. Chọn bài</text>
  <text x="547" y="300" text-anchor="middle" class="text">Môn học, chương, bài</text>
  <rect x="745" y="235" width="235" height="95" rx="10" class="box"/>
  <text x="862" y="270" text-anchor="middle" class="boxTitle">3. Học nội dung</text>
  <text x="862" y="300" text-anchor="middle" class="text">Đọc PDF, bài giảng</text>
  <rect x="1060" y="235" width="235" height="95" rx="10" class="box"/>
  <text x="1177" y="270" text-anchor="middle" class="boxTitle">4. Hỏi AI</text>
  <text x="1177" y="300" text-anchor="middle" class="text">Giải thích theo bài học</text>
  <rect x="1375" y="235" width="235" height="95" rx="10" class="box"/>
  <text x="1492" y="270" text-anchor="middle" class="boxTitle">5. Ghi nhận</text>
  <text x="1492" y="300" text-anchor="middle" class="text">Trang đọc, câu hỏi, thời lượng</text>
  <path d="M350 282 H430" class="arrow"/><path d="M665 282 H745" class="arrow"/><path d="M980 282 H1060" class="arrow"/><path d="M1295 282 H1375" class="arrow"/>

  <rect x="70" y="440" width="1660" height="230" rx="16" class="group"/>
  <text x="110" y="485" class="boxTitle">Giai đoạn 2: Làm bài và nhận phản hồi</text>
  <rect x="210" y="525" width="270" height="95" rx="10" class="box"/>
  <text x="345" y="560" text-anchor="middle" class="boxTitle">6. Làm bài</text>
  <text x="345" y="590" text-anchor="middle" class="text">Quiz, bài tập được giao</text>
  <rect x="575" y="525" width="270" height="95" rx="10" class="box"/>
  <text x="710" y="560" text-anchor="middle" class="boxTitle">7. Nộp bài</text>
  <text x="710" y="590" text-anchor="middle" class="text">Gửi câu trả lời lên hệ thống</text>
  <rect x="940" y="525" width="270" height="95" rx="10" class="box"/>
  <text x="1075" y="560" text-anchor="middle" class="boxTitle">8. AI chấm</text>
  <text x="1075" y="590" text-anchor="middle" class="text">Điểm, nhận xét, lỗi sai</text>
  <rect x="1305" y="525" width="270" height="95" rx="10" class="box"/>
  <text x="1440" y="560" text-anchor="middle" class="boxTitle">9. Nhận phản hồi</text>
  <text x="1440" y="590" text-anchor="middle" class="text">Xem điểm và gợi ý học lại</text>
  <path d="M480 572 H575" class="arrow"/><path d="M845 572 H940" class="arrow"/><path d="M1210 572 H1305" class="arrow"/>
  <path d="M1492 330 C1492 410 345 410 345 525" class="arrow"/>

  <rect x="70" y="730" width="1660" height="210" rx="16" class="group"/>
  <text x="110" y="775" class="boxTitle">Giai đoạn 3: Phát hiện điểm yếu và luyện tập khắc phục</text>
  <rect x="190" y="815" width="320" height="90" rx="10" class="box"/>
  <text x="350" y="848" text-anchor="middle" class="boxTitle">10. Phát hiện điểm yếu</text>
  <text x="350" y="878" text-anchor="middle" class="text">Sai câu hỏi, điểm thấp, chủ đề yếu</text>
  <rect x="600" y="815" width="320" height="90" rx="10" class="box"/>
  <text x="760" y="848" text-anchor="middle" class="boxTitle">11. Luyện tập khắc phục</text>
  <text x="760" y="878" text-anchor="middle" class="text">AI tạo bài ôn phù hợp</text>
  <rect x="1010" y="815" width="320" height="90" rx="10" class="box"/>
  <text x="1170" y="848" text-anchor="middle" class="boxTitle">12. Cập nhật tiến bộ</text>
  <text x="1170" y="878" text-anchor="middle" class="text">Lưu kết quả, mức cải thiện</text>
  <path d="M1440 620 C1440 700 350 700 350 815" class="dash"/>
  <path d="M510 860 H600" class="arrow"/><path d="M920 860 H1010" class="arrow"/>
  <path d="M1170 905 C1170 985 862 985 862 330" class="dash"/>

  <rect x="180" y="970" width="1440" height="50" rx="8" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="900" y="1002" text-anchor="middle" class="small">Dữ liệu lưu lại: phiên học, trang PDF, hội thoại AI, bài làm, điểm, điểm yếu, bài luyện tập và mức độ cải thiện.</text>
</svg>
