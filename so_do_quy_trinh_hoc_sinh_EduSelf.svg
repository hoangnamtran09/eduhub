<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#0f172a}.sub{font:500 18px Arial,sans-serif;fill:#475569}.boxTitle{font:700 20px Arial,sans-serif;fill:#0f172a}.text{font:500 15px Arial,sans-serif;fill:#334155}.small{font:500 13px Arial,sans-serif;fill:#64748b}.arrow{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke:#059669;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrowGreen)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#059669"/></marker>
    <linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="g2" x1="0" x2="1"><stop offset="0" stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/></linearGradient>
    <linearGradient id="g3" x1="0" x2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#ffedd5"/></linearGradient>
    <linearGradient id="g4" x1="0" x2="1"><stop offset="0" stop-color="#f5f3ff"/><stop offset="1" stop-color="#ede9fe"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="#fff"/>
  <text x="800" y="58" text-anchor="middle" class="title">Hình 9. Quy trình học sinh học bài, hỏi AI và khắc phục điểm yếu</text>
  <text x="800" y="88" text-anchor="middle" class="sub">Luồng học cá nhân hóa: học nội dung - tương tác AI - làm bài - nhận phản hồi - luyện tập bù đắp</text>

  <rect x="80" y="185" width="190" height="120" rx="24" fill="url(#g1)" stroke="#60a5fa" stroke-width="2"/>
  <text x="175" y="225" text-anchor="middle" class="boxTitle">1. Đăng nhập</text>
  <text x="175" y="258" text-anchor="middle" class="text">Học sinh vào hệ thống</text>
  <text x="175" y="282" text-anchor="middle" class="small">Tải hồ sơ, lớp, tiến độ</text>

  <rect x="335" y="185" width="190" height="120" rx="24" fill="url(#g2)" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="225" text-anchor="middle" class="boxTitle">2. Chọn bài</text>
  <text x="430" y="258" text-anchor="middle" class="text">Môn học, chương, bài</text>
  <text x="430" y="282" text-anchor="middle" class="small">Tiếp tục từ bài đang học</text>

  <rect x="590" y="185" width="190" height="120" rx="24" fill="url(#g2)" stroke="#22c55e" stroke-width="2"/>
  <text x="685" y="225" text-anchor="middle" class="boxTitle">3. Học nội dung</text>
  <text x="685" y="258" text-anchor="middle" class="text">Đọc PDF/bài học</text>
  <text x="685" y="282" text-anchor="middle" class="small">Lưu trang, thời lượng học</text>

  <rect x="845" y="185" width="190" height="120" rx="24" fill="url(#g4)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="940" y="225" text-anchor="middle" class="boxTitle">4. Hỏi AI</text>
  <text x="940" y="258" text-anchor="middle" class="text">Đặt câu hỏi theo bài</text>
  <text x="940" y="282" text-anchor="middle" class="small">AI giải thích theo ngữ cảnh</text>

  <rect x="1100" y="185" width="190" height="120" rx="24" fill="url(#g3)" stroke="#fb923c" stroke-width="2"/>
  <text x="1195" y="225" text-anchor="middle" class="boxTitle">5. Làm bài</text>
  <text x="1195" y="258" text-anchor="middle" class="text">Quiz/bài tập AI</text>
  <text x="1195" y="282" text-anchor="middle" class="small">Nộp câu trả lời</text>

  <rect x="1355" y="185" width="190" height="120" rx="24" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="1450" y="225" text-anchor="middle" class="boxTitle">6. Nhận phản hồi</text>
  <text x="1450" y="258" text-anchor="middle" class="text">Điểm, nhận xét, gợi ý</text>
  <text x="1450" y="282" text-anchor="middle" class="small">Cập nhật tiến độ</text>

  <path class="arrow" d="M270 245 H335"/><path class="arrow" d="M525 245 H590"/><path class="arrow" d="M780 245 H845"/><path class="arrow" d="M1035 245 H1100"/><path class="arrow" d="M1290 245 H1355"/>

  <rect x="230" y="500" width="260" height="130" rx="26" fill="#fef2f2" stroke="#fb7185" stroke-width="2"/>
  <text x="360" y="542" text-anchor="middle" class="boxTitle">7. Phát hiện điểm yếu</text>
  <text x="360" y="575" text-anchor="middle" class="text">Sai câu hỏi, điểm thấp</text>
  <text x="360" y="600" text-anchor="middle" class="small">Lưu chủ đề, nguyên nhân, bằng chứng</text>

  <rect x="670" y="500" width="260" height="130" rx="26" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="800" y="542" text-anchor="middle" class="boxTitle">8. Luyện tập khắc phục</text>
  <text x="800" y="575" text-anchor="middle" class="text">AI tạo bài ôn phù hợp</text>
  <text x="800" y="600" text-anchor="middle" class="small">Làm lại đúng phần còn yếu</text>

  <rect x="1110" y="500" width="260" height="130" rx="26" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="1240" y="542" text-anchor="middle" class="boxTitle">9. Cập nhật cải thiện</text>
  <text x="1240" y="575" text-anchor="middle" class="text">Lưu điểm tốt nhất</text>
  <text x="1240" y="600" text-anchor="middle" class="small">Đánh dấu đã khắc phục nếu đạt</text>

  <path class="dash" d="M1450 305 C1450 420 360 395 360 500"/>
  <path class="arrow" d="M490 565 H670"/><path class="arrow" d="M930 565 H1110"/>
  <path class="dash" d="M1240 630 C1240 760 685 760 685 305"/>

  <rect x="230" y="735" width="1140" height="70" rx="22" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="800" y="765" text-anchor="middle" class="text">Dữ liệu được ghi lại: phiên học, trang PDF, hội thoại AI, điểm bài làm, điểm yếu, bài luyện tập và mức độ cải thiện</text>
  <text x="800" y="792" text-anchor="middle" class="small">Kết quả dùng cho dashboard học sinh, báo cáo phụ huynh/giáo viên và gợi ý lộ trình học tiếp theo</text>
</svg>
